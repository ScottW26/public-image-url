<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shelf — candidate-first bench</title>
<style>
  :root {
    --bg:#0e1116; --panel:#171b22; --panel-2:#1e242d; --line:#2a323d;
    --text:#e7ecf3; --muted:#8b97a7; --accent:#4f9dff; --accent-dim:#1f3a5f;
    --good:#38c172; --warm:#f6b73c; --hot:#ff6b6b; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  header.topbar{display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
  .brand{font-weight:800;font-size:19px;letter-spacing:-0.3px}
  .brand span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:12.5px;margin-left:-6px}
  .topbar nav{display:flex;gap:4px;margin-left:16px}
  .topbar nav button{background:none;border:none;color:var(--muted);padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600}
  .topbar nav button.active{background:var(--panel-2);color:var(--text)}
  .topbar nav button:hover{color:var(--text)}
  .spacer{flex:1}
  .src{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-right:4px}
  .src .dot{width:7px;height:7px;border-radius:50%;background:var(--warm)}
  .src.live .dot{background:var(--good)}
  .btn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-weight:700;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:13px}

  main{padding:24px 26px 80px;max-width:1220px;margin:0 auto}

  .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:8px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .metric .n{font-size:26px;font-weight:800;letter-spacing:-0.5px}
  .metric .l{color:var(--muted);font-size:12px;margin-top:2px}
  .creed{color:var(--muted);font-size:12.5px;margin:14px 2px 22px;font-style:italic}

  .controls{display:flex;gap:10px;align-items:center;margin:0 2px 16px;flex-wrap:wrap}
  .controls input[type=text]{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13.5px;width:240px}
  .controls select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13.5px}

  .section-head{display:flex;align-items:baseline;gap:12px;margin:8px 2px 14px}
  .section-head h2{margin:0;font-size:17px;letter-spacing:-0.2px}
  .section-head .sub{color:var(--muted);font-size:13px}

  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .12s,transform .12s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .name{font-weight:800;font-size:15.5px}
  .card .role{color:var(--muted);font-size:12.5px;margin-top:1px}
  .card .ref{font-size:12.5px;color:var(--text);opacity:.85;margin-top:11px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .foot{margin-top:13px;padding-top:11px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .card .foot b{color:var(--text)}

  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.active{background:rgba(56,193,114,.14);color:var(--good)}
  .pill.parked{background:rgba(139,151,167,.14);color:var(--muted)}
  .pill.sec{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .matchbadge{font-weight:800;font-size:14px}
  .m-hot{color:var(--good)} .m-warm{color:var(--warm)} .m-none{color:var(--muted)}

  .back{background:none;border:none;color:var(--muted);font-size:13px;padding:0;margin-bottom:14px}
  .back:hover{color:var(--text)}
  .detail-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:18px;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .panel h3{margin:0 0 4px;font-size:15px}
  .panel .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}

  .cand-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
  .cand-header h1{margin:0;font-size:22px;letter-spacing:-0.5px}
  .cand-sub{color:var(--muted);font-size:13.5px;margin-bottom:14px}
  .specsheet dl{display:grid;grid-template-columns:118px 1fr;gap:8px 14px;margin:0}
  .specsheet dt{color:var(--muted);font-size:12.5px}
  .specsheet dd{margin:0;font-size:13px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .tag{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:11.5px}
  .ref-block{background:var(--panel-2);border-left:3px solid var(--accent);padding:11px 13px;border-radius:6px;font-size:13px;line-height:1.5;margin-top:14px}
  .hooks{margin:12px 0 0;padding:0;list-style:none}
  .hooks li{font-size:12.5px;line-height:1.5;padding-left:18px;position:relative;margin-bottom:6px;color:var(--text);opacity:.9}
  .hooks li:before{content:"▸";position:absolute;left:0;color:var(--accent)}

  .target{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .target:last-child{border-bottom:none}
  .target .tinfo{flex:1;min-width:0}
  .target .tname{font-weight:700;font-size:13.5px}
  .target .tmeta{color:var(--muted);font-size:11.5px;margin-top:1px}
  .geo{font-size:10.5px;padding:1px 6px;border-radius:5px;background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .geo.in{color:var(--good)} .geo.border{color:var(--warm)}

  .so{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .so:last-child{border-bottom:none}
  .so .when{color:var(--muted);font-size:11.5px;width:62px;flex-shrink:0;padding-top:2px}
  .so .body{flex:1}
  .so .emp{font-weight:700;font-size:13.5px}
  .so .status{font-size:12px;margin-top:1px}
  .stat-sent{color:var(--muted)} .stat-opened{color:var(--accent)} .stat-interested{color:var(--warm)}
  .stat-call{color:var(--good)} .stat-placed{color:var(--good);font-weight:700} .stat-passed{color:var(--muted)}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;width:560px;max-width:92vw;max-height:88vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  label.f{display:block;margin-bottom:13px}
  label.f span{display:block;color:var(--muted);font-size:12.5px;margin-bottom:5px}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit}
  .modal textarea{min-height:150px;resize:vertical;line-height:1.55}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .pitchbox{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;white-space:pre-wrap}
  .anonnote{font-size:11.5px;color:var(--warm);margin:8px 0 0;display:flex;gap:6px;align-items:flex-start}

  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty h2{color:var(--text);margin-bottom:6px}
  .priv{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin:0 2px 18px;display:flex;gap:8px;align-items:flex-start}
  .priv b{color:var(--text)}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">Shelf<span>.</span></div>
  <div class="tagline">the candidate is the product</div>
  <nav id="nav"></nav>
  <div class="spacer"></div>
  <div class="src" id="srcBadge"><span class="dot"></span><span id="srcText">sample</span></div>
  <button class="btn ghost sm" onclick="document.getElementById('benchFile').click()">Load my bench</button>
  <input type="file" id="benchFile" accept="application/json" style="display:none" onchange="importBench(event)">
</header>
<main id="app"></main>
<div id="modal-root"></div>

<script>
/* ============================================================
   Shelf — a candidate-first bench tool for Williams Recruitment.
   The bench IS the product. Each candidate's live job matches are
   the targets; the spec-out is the one action that matters.

   PRIVACY: real candidate data never leaves this browser. The
   public repo ships an anonymised sample only. "Load my bench"
   reads your per_candidate.json locally (FileReader) into this
   browser's localStorage — no upload, no server, no commit.
   ============================================================ */

const LS_BENCH = 'shelf.bench.v1';     // your real bench (local only)
const LS_OUT   = 'shelf.specouts.v1';  // spec-out log (local only)
const todayISO = '2026-06-19';

let BENCH = null;      // {candidates:[...]}
let SOURCE = 'sample'; // 'sample' | 'local'
let SPECOUTS = loadSpecouts();
let view = { name:'board', id:null };
let filter = { q:'', sector:'all', status:'all' };

/* ---------- load ---------- */
function loadSpecouts(){ try{ return JSON.parse(localStorage.getItem(LS_OUT))||[] }catch(e){ return [] } }
function saveSpecouts(){ localStorage.setItem(LS_OUT, JSON.stringify(SPECOUTS)); }

async function boot(){
  const local = localStorage.getItem(LS_BENCH);
  if(local){
    try { BENCH = JSON.parse(local); SOURCE='local'; render(); updateSrc(); return; } catch(e){}
  }
  // fall back to anonymised sample shipped with the repo
  try {
    const res = await fetch('bench.sample.json');
    BENCH = await res.json(); SOURCE='sample';
  } catch(e){
    BENCH = { candidates: [] };
    document.getElementById('app').innerHTML =
      `<div class="empty"><h2>Couldn't load the sample</h2><p>Open this page over http (or use “Load my bench”). If you double-clicked the file, your browser may block local fetches.</p></div>`;
  }
  render(); updateSrc();
}

function updateSrc(){
  const b = document.getElementById('srcBadge');
  const t = document.getElementById('srcText');
  if(SOURCE==='local'){ b.classList.add('live'); t.textContent = `your bench · ${(BENCH.candidates||[]).length}`; }
  else { b.classList.remove('live'); t.textContent = `anonymised sample`; }
}

function importBench(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!data.candidates || !Array.isArray(data.candidates)) throw new Error('no candidates[]');
      BENCH = data; SOURCE='local';
      localStorage.setItem(LS_BENCH, JSON.stringify(data));
      view = {name:'board', id:null}; render(); updateSrc();
    } catch(e){ alert('That file did not look like a per_candidate.json bench export.\n\n('+e.message+')'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

/* ---------- helpers ---------- */
function cand(id){ return (BENCH.candidates||[]).find(c => cid(c)===id); }
function cid(c){ return c.candidateId || c.name; }
function matches(c){ return (c.matches||[]).filter(m=>m && (m.title||m.company)); }
function topMatch(c){ const m=matches(c); return m.length? Math.max(...m.map(x=>x.pct||0)) : 0; }
function statusOf(c){ return c.status || 'active'; }
function outsFor(id){ return SPECOUTS.filter(s=>s.candidateId===id); }
function daysAgo(iso){ const d=(new Date(todayISO)-new Date(iso))/86400000; if(d<1)return'today'; if(d<2)return'yesterday'; return Math.round(d)+'d ago'; }

const SO_LABEL = { sent:'Spec sent', opened:'Opened', interested:'Interested', call:'Call booked', placed:'Placed', passed:'Passed' };
const SO_ORDER = ['sent','opened','interested','call','placed','passed'];

/* heat = closeness to a spec-out opportunity */
function heatClass(c){ const t=topMatch(c); if(t>=80)return'm-hot'; if(t>0)return'm-warm'; return'm-none'; }

/* ---------- render ---------- */
function render(){
  renderNav();
  const app = document.getElementById('app');
  if(view.name==='board') app.innerHTML = boardView();
  else if(view.name==='candidate') app.innerHTML = candidateView(view.id);
}
function renderNav(){
  document.getElementById('nav').innerHTML =
    `<button class="${view.name!=='candidate'?'active':''}" onclick="go('board')">The Bench</button>`;
}

function metricsStrip(){
  const cs = BENCH.candidates||[];
  const active = cs.filter(c=>statusOf(c)==='active').length;
  const withTargets = cs.filter(c=>matches(c).length>0).length;
  const totalTargets = cs.reduce((n,c)=>n+matches(c).length,0);
  const sent = SPECOUTS.length;
  const live = SPECOUTS.filter(s=>['interested','call'].includes(s.status)).length;
  const m = [
    [cs.length,'on the bench'],
    [active,'actively marketed'],
    [withTargets,'with live targets'],
    [totalTargets,'open target roles'],
    [sent,'spec-outs logged'],
  ];
  return `<div class="metrics">${m.map(([n,l])=>`<div class="metric"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('')}</div>`;
}

function boardView(){
  let cs = [...(BENCH.candidates||[])];
  // filters
  if(filter.sector!=='all') cs = cs.filter(c=>(c.primarySector||'')===filter.sector);
  if(filter.status!=='all') cs = cs.filter(c=>statusOf(c)===filter.status);
  if(filter.q){
    const q=filter.q.toLowerCase();
    cs = cs.filter(c=>JSON.stringify([c.name,c.primarySector,c.geography,c.seniority,c.targetRoles,c.anonRef]).toLowerCase().includes(q));
  }
  // sort: hottest first (top match desc, then # targets, then seniority)
  const SEN = {'C-suite':6,'SVP':5,'VP':4,'Director':3,'Senior Manager':2,'Manager':1};
  cs.sort((a,b)=> topMatch(b)-topMatch(a) || matches(b).length-matches(a).length || (SEN[b.seniority]||0)-(SEN[a.seniority]||0));

  const sectors = [...new Set((BENCH.candidates||[]).map(c=>c.primarySector).filter(Boolean))].sort();

  const cards = cs.map(c=>{
    const id=cid(c), m=matches(c), t=topMatch(c);
    return `<div class="card" onclick="openCandidate('${id}')">
      <div class="top">
        <div><div class="name">${esc(c.name)}</div><div class="role">${esc(c.seniority||'')} · ${esc(c.primarySector||'')} · ${esc(c.geography||'')}</div></div>
        <span class="pill ${statusOf(c)}">${statusOf(c)==='active'?'marketing':statusOf(c)}</span>
      </div>
      <div class="ref">${esc(c.anonRef||'No anon profile yet.')}</div>
      <div class="foot">
        <span class="matchbadge ${heatClass(c)}">${t?t+'%':'—'}</span>
        <span><b>${m.length}</b> live target${m.length!==1?'s':''}${m.length?` · top: ${esc(m[0].company||m[0].title||'')}`:''}</span>
      </div>
    </div>`;
  }).join('');

  return `${metricsStrip()}
    <div class="creed">One rule: if it doesn't help spec a candidate out, it's noise. So it isn't here.</div>
    ${SOURCE==='sample'? `<div class="priv">🔒 <span>You're viewing the <b>anonymised sample</b>. Click <b>Load my bench</b> (top right) and pick your <b>per_candidate.json</b> — it's read in this browser only, never uploaded and never committed.</span></div>`:''}
    <div class="controls">
      <input type="text" placeholder="Search bench…" value="${attr(filter.q)}" oninput="setFilter('q',this.value)">
      <select onchange="setFilter('sector',this.value)"><option value="all">All sectors</option>${sectors.map(s=>`<option ${filter.sector===s?'selected':''} value="${attr(s)}">${esc(s)}</option>`).join('')}</select>
      <select onchange="setFilter('status',this.value)"><option value="all">All</option><option ${filter.status==='active'?'selected':''} value="active">Active</option><option ${filter.status==='parked'?'selected':''} value="parked">Parked</option></select>
      <span style="color:var(--muted);font-size:12.5px">${cs.length} shown</span>
    </div>
    <div class="section-head"><h2>The Bench</h2><span class="sub">your products — ranked by who's closest to a spec-out</span></div>
    <div class="board">${cards||'<div class="empty">No candidates match.</div>'}</div>`;
}

function candidateView(id){
  const c = cand(id); if(!c) return '<div class="empty">Not found</div>';
  const m = matches(c); const outs = [...outsFor(id)].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sentTo = new Set(outs.map(o=>o.target));

  const sheet = `<div class="panel specsheet">
    <div class="cand-header"><h1>${esc(c.name)}</h1><span class="pill ${statusOf(c)}">${statusOf(c)==='active'?'marketing':statusOf(c)}</span></div>
    <div class="cand-sub">${esc(c.seniority||'')} · ${esc(c.primarySector||'')} · ${esc(c.geography||'')}</div>
    <dl>
      <dt>Targets</dt><dd>${(c.targetRoles||[]).map(esc).join(', ')||'—'}</dd>
      <dt>Sectors</dt><dd>${(c.sectorTags||[]).map(esc).join(', ')||esc(c.primarySector||'—')}</dd>
      <dt>Scale</dt><dd>${esc(c.scaleHandled||'—')}</dd>
      <dt>Anchors</dt><dd><div class="tags">${(c.anchorSkills||[]).map(s=>`<span class="tag">${esc(s)}</span>`).join('')||'—'}</div></dd>
    </dl>
    <div class="ref-block"><b style="color:var(--accent)">Anon spec:</b> ${esc(c.anonRef||'—')}</div>
    ${(c.pitchHooks||[]).length?`<div style="margin-top:14px"><div class="hint" style="margin:0 0 6px">Pitch hooks</div><ul class="hooks">${c.pitchHooks.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>`:''}
  </div>`;

  const engine = `<div class="panel">
    <h3>Spec-out engine <span style="color:var(--muted);font-weight:400;font-size:13px">· ${m.length} live target${m.length!==1?'s':''}</span></h3>
    <p class="hint">Open roles your engine matched to this candidate. Each one is a spec-out waiting to happen.</p>
    ${m.length? m.map((t,i)=>`
      <div class="target">
        <div class="tinfo">
          <div class="tname">${esc(t.title||'Role')} <span style="color:var(--muted);font-weight:400">· ${esc(t.company||'')}</span></div>
          <div class="tmeta">${esc(t.location||'')} ${t.source?'· '+esc(t.source):''} ${t.postedAt?'· posted '+daysAgo(t.postedAt):''} ${t.geoStatus?`<span class="geo ${esc(t.geoStatus)}">${esc(t.geoStatus)}</span>`:''}</div>
        </div>
        <span class="matchbadge ${ (t.pct||0)>=80?'m-hot':'m-warm'}">${t.pct||'?'}%</span>
        ${sentTo.has(targetKey(t))?'<span class="geo in" style="white-space:nowrap">specced ✓</span>':`<button class="btn sm" onclick="openSpecout('${id}',${i})">Spec out →</button>`}
      </div>`).join('')
      : `<div class="hint">No live targets from the engine yet. ${SOURCE==='sample'?'(Load your bench to see real matches.)':'They’ll appear here on the next engine run.'}</div>`}
  </div>`;

  const timeline = `<div class="panel" style="margin-top:18px">
    <h3>Spec-out log</h3>
    <p class="hint">Every time this candidate has been put in front of an employer.</p>
    ${outs.length? outs.map(o=>`
      <div class="so">
        <div class="when">${daysAgo(o.date)}</div>
        <div class="body">
          <div class="emp">${esc(o.targetLabel||'')}</div>
          <div class="status stat-${o.status}">${SO_LABEL[o.status]||o.status}</div>
          ${o.note?`<div class="hint" style="margin:3px 0 0">${esc(o.note)}</div>`:''}
          <div style="margin-top:6px"><button class="btn sm ghost" onclick="openAdvance('${o.id}')">Log update</button></div>
        </div>
      </div>`).join('')
      : '<div class="hint">Not specced out yet. Use the engine →</div>'}
  </div>`;

  return `<button class="back" onclick="go('board')">← The Bench</button>
    <div class="detail-grid"><div>${sheet}</div><div>${engine}${timeline}</div></div>`;
}

/* ---------- spec-out ---------- */
function targetKey(t){ return (t.company||'')+'|'+(t.title||''); }

function openSpecout(id, idx){
  const c = cand(id); const t = matches(c)[idx];
  modal(`<h3>Spec out — ${esc(c.name)} → ${esc(t.company||'')}</h3>
    <p class="hint" style="margin:-4px 0 12px">This is the whole job: put the candidate in front of the employer. Edit the pitch, then log it.</p>
    <div class="pitchbox" id="pitchbox">${esc(pitch(c,t))}</div>
    <div class="anonnote">⚠ <span>Outbound copy uses the <b>anon spec</b> only — no name, no current employer. Identity stays in your decoder.</span></div>
    <label class="f" style="margin-top:12px"><span>Note (optional)</span><input id="m_note" placeholder="e.g. sent to hiring VP via LinkedIn"></label>
    <div class="modal-actions">
      <button class="btn ghost" onclick="copyPitch()">Copy</button>
      <button class="btn" onclick="logSpecout('${id}',${idx})">Log spec-out</button>
    </div>`);
}
function pitch(c, t){
  const role = (c.targetRoles||[])[0] || c.seniority || 'senior leader';
  const hooks = (c.pitchHooks||[]).slice(0,3).map(h=>'• '+h).join('\n');
  const company = t.company || 'your team';
  return `Subject: ${role} — available now, ${c.primarySector||''}

Hi — I look after a small bench of ${c.primarySector||''} leaders and one of them is a strong fit for ${company}${t.title?` (saw your ${t.title} role)`:''}.

${c.anonRef||''}

A few highlights:
${hooks}

Based in ${c.geography||'the US'}, open to ${role} mandates. Happy to share a full anonymised profile and set up a confidential call this week.

Best,
Scott
Williams Recruitment`;
}
function copyPitch(){ const el=document.getElementById('pitchbox'); navigator.clipboard && navigator.clipboard.writeText(el.innerText); }
function logSpecout(id, idx){
  const c = cand(id); const t = matches(c)[idx];
  SPECOUTS.push({ id:'s'+Math.random().toString(36).slice(2,8), candidateId:id, target:targetKey(t),
    targetLabel:`${t.title||''} · ${t.company||''}`, date:todayISO, status:'sent', note:document.getElementById('m_note').value.trim() });
  saveSpecouts(); closeModal(); render();
}
function openAdvance(sid){
  const s = SPECOUTS.find(x=>x.id===sid);
  modal(`<h3>Update — ${esc(s.targetLabel||'')}</h3>
    <label class="f"><span>Where's it at?</span><select id="m_st">${SO_ORDER.map(o=>`<option value="${o}" ${s.status===o?'selected':''}>${SO_LABEL[o]}</option>`).join('')}</select></label>
    <label class="f"><span>Note</span><input id="m_n" value="${attr(s.note||'')}"></label>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveAdvance('${sid}')">Save</button></div>`);
}
function saveAdvance(sid){
  const s = SPECOUTS.find(x=>x.id===sid);
  s.status=document.getElementById('m_st').value; s.note=document.getElementById('m_n').value.trim();
  saveSpecouts(); closeModal(); render();
}

/* ---------- nav / modal / util ---------- */
function go(n){ view={name:n,id:null}; render(); }
function openCandidate(id){ view={name:'candidate',id}; window.scrollTo(0,0); render(); }
function setFilter(k,v){ filter[k]=v; render(); if(k==='q'){ const el=document.querySelector('.controls input'); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);} } }
function modal(h){ document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function attr(s){ return (s==null?'':String(s)).replace(/"/g,'&quot;'); }

boot();
</script>
</body>
