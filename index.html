<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shelf — candidate-first bench</title>
<style>
  :root {
    --bg:#0e1116; --panel:#171b22; --panel-2:#1e242d; --line:#2a323d;
    --text:#e7ecf3; --muted:#8b97a7; --accent:#4f9dff; --accent-dim:#1f3a5f;
    --good:#38c172; --warm:#f6b73c; --hot:#ff6b6b; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  header.topbar{display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
  .brand{font-weight:800;font-size:19px;letter-spacing:-0.3px}
  .brand span{color:var(--accent)}
  .tagline{color:var(--muted);font-size:12.5px;margin-left:-6px}
  .topbar nav{display:flex;gap:4px;margin-left:16px}
  .topbar nav button{background:none;border:none;color:var(--muted);padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600}
  .topbar nav button.active{background:var(--panel-2);color:var(--text)}
  .topbar nav button:hover{color:var(--text)}
  .spacer{flex:1}
  .src{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-right:4px}
  .src .dot{width:7px;height:7px;border-radius:50%;background:var(--warm)}
  .src.live .dot{background:var(--good)}
  .btn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-weight:700;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:13px}

  main{padding:24px 26px 80px;max-width:1220px;margin:0 auto}

  .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:8px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .metric .n{font-size:26px;font-weight:800;letter-spacing:-0.5px}
  .metric .l{color:var(--muted);font-size:12px;margin-top:2px}
  .creed{color:var(--muted);font-size:12.5px;margin:14px 2px 22px;font-style:italic}

  .controls{display:flex;gap:10px;align-items:center;margin:0 2px 16px;flex-wrap:wrap}
  .controls input[type=text]{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13.5px;width:240px}
  .controls select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13.5px}

  .section-head{display:flex;align-items:baseline;gap:12px;margin:8px 2px 14px}
  .section-head h2{margin:0;font-size:17px;letter-spacing:-0.2px}
  .section-head .sub{color:var(--muted);font-size:13px}

  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .12s,transform .12s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .name{font-weight:800;font-size:15.5px}
  .card .role{color:var(--muted);font-size:12.5px;margin-top:1px}
  .card .ref{font-size:12.5px;color:var(--text);opacity:.85;margin-top:11px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .foot{margin-top:13px;padding-top:11px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .card .foot b{color:var(--text)}

  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.active{background:rgba(56,193,114,.14);color:var(--good)}
  .pill.parked{background:rgba(139,151,167,.14);color:var(--muted)}
  .pill.sec{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .matchbadge{font-weight:800;font-size:14px}
  .m-hot{color:var(--good)} .m-warm{color:var(--warm)} .m-none{color:var(--muted)}

  .back{background:none;border:none;color:var(--muted);font-size:13px;padding:0;margin-bottom:14px}
  .back:hover{color:var(--text)}
  .detail-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:18px;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .panel h3{margin:0 0 4px;font-size:15px}
  .panel .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}

  .cand-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
  .cand-header h1{margin:0;font-size:22px;letter-spacing:-0.5px}
  .cand-sub{color:var(--muted);font-size:13.5px;margin-bottom:14px}
  .specsheet dl{display:grid;grid-template-columns:118px 1fr;gap:8px 14px;margin:0}
  .specsheet dt{color:var(--muted);font-size:12.5px}
  .specsheet dd{margin:0;font-size:13px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .tag{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:11.5px}
  .ref-block{background:var(--panel-2);border-left:3px solid var(--accent);padding:11px 13px;border-radius:6px;font-size:13px;line-height:1.5;margin-top:14px}
  .hooks{margin:12px 0 0;padding:0;list-style:none}
  .hooks li{font-size:12.5px;line-height:1.5;padding-left:18px;position:relative;margin-bottom:6px;color:var(--text);opacity:.9}
  .hooks li:before{content:"▸";position:absolute;left:0;color:var(--accent)}

  .target{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .target:last-child{border-bottom:none}
  .target .tinfo{flex:1;min-width:0}
  .target .tname{font-weight:700;font-size:13.5px}
  .target .tmeta{color:var(--muted);font-size:11.5px;margin-top:1px}
  .geo{font-size:10.5px;padding:1px 6px;border-radius:5px;background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .geo.in{color:var(--good)} .geo.border{color:var(--warm)}

  /* perfect-fit businesses */
  .biz{padding:13px 0;border-bottom:1px solid var(--line)}
  .biz:last-child{border-bottom:none}
  .biz .bh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .biz .bn{font-weight:700;font-size:14px}
  .biz .bm{color:var(--muted);font-size:11.5px;margin-top:2px}
  .fitb{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .fit-strong{background:rgba(56,193,114,.16);color:var(--good)}
  .fit-good{background:rgba(79,157,255,.16);color:var(--accent)}
  .fit-stretch{background:rgba(246,183,60,.16);color:var(--warm)}
  .why{margin:9px 0 0;padding:0;list-style:none}
  .why li{font-size:12px;line-height:1.5;padding-left:16px;position:relative;color:var(--text);opacity:.9;margin-bottom:4px}
  .why li:before{content:"→";position:absolute;left:0;color:var(--accent)}
  .contact{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
  .contact .crole{font-size:11.5px;color:var(--muted)}
  .contact .em{font-size:12px;color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--panel-2);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
  .eb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
  .eb-verified{background:rgba(56,193,114,.16);color:var(--good)}
  .eb-format_valid{background:rgba(246,183,60,.14);color:var(--warm)}
  .eb-unverified{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .eb-risky{background:rgba(246,183,60,.12);color:var(--warm)}
  .eb-invalid{background:rgba(255,107,107,.16);color:var(--hot)}

  .so{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .so:last-child{border-bottom:none}
  .so .when{color:var(--muted);font-size:11.5px;width:62px;flex-shrink:0;padding-top:2px}
  .so .body{flex:1}
  .so .emp{font-weight:700;font-size:13.5px}
  .so .status{font-size:12px;margin-top:1px}
  .stat-sent{color:var(--muted)} .stat-opened{color:var(--accent)} .stat-interested{color:var(--warm)}
  .stat-call{color:var(--good)} .stat-placed{color:var(--good);font-weight:700} .stat-passed{color:var(--muted)}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;width:560px;max-width:92vw;max-height:88vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  label.f{display:block;margin-bottom:13px}
  label.f span{display:block;color:var(--muted);font-size:12.5px;margin-bottom:5px}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit}
  .modal textarea{min-height:150px;resize:vertical;line-height:1.55}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .pitchbox{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;white-space:pre-wrap}
  .anonnote{font-size:11.5px;color:var(--warm);margin:8px 0 0;display:flex;gap:6px;align-items:flex-start}
  .stat-offer{color:var(--warm)}

  /* view toggle */
  .vtoggle{display:flex;gap:2px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:2px}
  .vtoggle button{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:6px}
  .vtoggle button.on{background:var(--accent);color:#fff}

  /* pipeline (kanban) */
  .pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px}
  .col{flex:0 0 232px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 10px 6px;align-self:flex-start;min-height:90px}
  .col.over{border-color:var(--accent);background:#19222e}
  .col .colhead{display:flex;justify-content:space-between;align-items:center;margin:2px 3px 2px}
  .col .colhead .t{font-size:12.5px;font-weight:700}
  .col .colhead .cnt{color:var(--muted);font-size:12px;font-weight:600}
  .col .stagebar{height:3px;border-radius:3px;margin:8px 2px 10px;opacity:.85}
  .kcard{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:10px 11px;margin-bottom:8px;cursor:grab}
  .kcard:active{cursor:grabbing}
  .kcard:hover{border-color:var(--accent)}
  .kcard .kn{font-weight:700;font-size:13px;line-height:1.2}
  .kcard .kr{color:var(--muted);font-size:11px;margin-top:2px}
  .kcard .kf{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--muted)}
  .kcard.parked{opacity:.5}
  .kcard.done{border-color:rgba(56,193,114,.45)}
  .kcard .placedco{color:var(--good);font-size:11px;margin-top:6px;font-weight:600}
  .colempty{color:var(--muted);font-size:11.5px;text-align:center;padding:14px 6px;opacity:.6}

  /* progress stepper */
  .progress-panel{margin-bottom:18px}
  .stepper{display:flex;margin:6px 0 2px}
  .step{flex:1;text-align:center;font-size:10.5px;color:var(--muted);position:relative;padding-top:18px;cursor:pointer}
  .step:not(:first-child):before{content:"";position:absolute;top:6px;left:-50%;right:50%;height:2px;background:var(--line)}
  .step.fill:not(:first-child):before{background:var(--accent)}
  .step .dotc{position:absolute;top:1px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:var(--line);border:2px solid var(--panel)}
  .step.fill{color:var(--text)} .step.fill .dotc{background:var(--accent)}
  .step.current .dotc{background:var(--good);box-shadow:0 0 0 4px rgba(56,193,114,.22)}
  .step.current{color:var(--good);font-weight:700}
  .step.done-stage .dotc{background:var(--good)} .step.done-stage:not(:first-child):before{background:var(--good)}
  .stage-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;color:#0e1116}

  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty h2{color:var(--text);margin-bottom:6px}
  .priv{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin:0 2px 18px;display:flex;gap:8px;align-items:flex-start}
  .priv b{color:var(--text)}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">Shelf<span>.</span></div>
  <div class="tagline">the candidate is the product</div>
  <nav id="nav"></nav>
  <div class="spacer"></div>
  <div class="src" id="srcBadge"><span class="dot"></span><span id="srcText">sample</span></div>
  <button class="btn ghost sm" onclick="openKeyModal()" title="Reoon email verification key">🔑 Key</button>
  <button class="btn ghost sm" onclick="refresh()" title="Re-read your local bench file">↻ Refresh</button>
  <button class="btn ghost sm" onclick="document.getElementById('benchFile').click()">Load my bench</button>
  <input type="file" id="benchFile" accept="application/json" style="display:none" onchange="importBench(event)">
</header>
<main id="app"></main>
<div id="modal-root"></div>

<script>
/* ============================================================
   Shelf — a candidate-first bench tool for Williams Recruitment.
   The bench IS the product. Each candidate's live job matches are
   the targets; the spec-out is the one action that matters.

   PRIVACY: real candidate data never leaves this browser. The
   public repo ships an anonymised sample only. "Load my bench"
   reads your per_candidate.json locally (FileReader) into this
   browser's localStorage — no upload, no server, no commit.
   ============================================================ */

const LS_BENCH = 'shelf.bench.v1';     // your real bench (local only)
const LS_OUT   = 'shelf.specouts.v1';  // spec-out log (local only)
const LS_PROG  = 'shelf.progress.v1';  // per-candidate stage (local only, survives refresh)
const LS_KEY   = 'shelf.reoon.key';    // Reoon API key (this browser only, never committed)
const LS_EMAIL = 'shelf.emailv.v1';    // verification results, keyed by email address
const todayISO = '2026-06-19';

/* Every candidate is a project moving off the shelf and into a business.
   Placement = Complete. Stages are ordered; progress only moves forward
   automatically (spec-out updates), but you can drag a card anywhere. */
const STAGES = [
  { key:'shelf',     label:'On the shelf', color:'#8b97a7' },
  { key:'specced',   label:'Specced out',  color:'#4f9dff' },
  { key:'inplay',    label:'In play',      color:'#f6b73c' },
  { key:'interview', label:'Interviewing', color:'#a78bfa' },
  { key:'offer',     label:'Offer',        color:'#ff8c42' },
  { key:'complete',  label:'Complete',     color:'#38c172' },
];
const STAGE_IDX = Object.fromEntries(STAGES.map((s,i)=>[s.key,i]));
const STAGE = Object.fromEntries(STAGES.map(s=>[s.key,s]));
const SO_TO_STAGE = { sent:'specced', opened:'specced', interested:'inplay', call:'interview', offer:'offer', placed:'complete' };

let BENCH = null;      // {candidates:[...]}
let SOURCE = 'sample'; // 'sample' | 'local' | 'file'
let SPECOUTS = loadSpecouts();
let PROG = loadProgress();
let view = { name:'board', id:null };
let boardMode = 'pipeline'; // 'pipeline' | 'list'
let filter = { q:'', sector:'all', status:'all' };

/* ---------- load ---------- */
function loadSpecouts(){ try{ return JSON.parse(localStorage.getItem(LS_OUT))||[] }catch(e){ return [] } }
function saveSpecouts(){ localStorage.setItem(LS_OUT, JSON.stringify(SPECOUTS)); }
function loadProgress(){ try{ return JSON.parse(localStorage.getItem(LS_PROG))||{} }catch(e){ return {} } }
function saveProgress(){ localStorage.setItem(LS_PROG, JSON.stringify(PROG)); }

/* stage of a candidate-project: an explicit (dragged/placed) stage wins;
   otherwise it's derived from how far their spec-outs have got. */
function derivedStage(id){
  let best = -1;
  for(const o of outsFor(id)){ const st = SO_TO_STAGE[o.status]; if(st!=null && STAGE_IDX[st]>best) best = STAGE_IDX[st]; }
  return best<0 ? 'shelf' : STAGES[best].key;
}
function stageOf(c){ const p = PROG[cid(c)]; return (p && p.stage) ? p.stage : derivedStage(cid(c)); }
function setStage(id, stage, extra){ PROG[id] = Object.assign({}, PROG[id], { stage, updatedAt:todayISO }, extra||{}); saveProgress(); }
function syncStageFromOuts(id){ const d = derivedStage(id); const cur = PROG[id] && PROG[id].stage; if(!cur || STAGE_IDX[d] > STAGE_IDX[cur]) setStage(id, d); }
function refresh(){ boot(); }

async function boot(){
  // 1) Real bench from a LOCAL FILE next to index.html (gitignored, never committed).
  //    Drop your per_candidate.json here as bench.local.json (or per_candidate.json)
  //    and it loads live — full names, full data, all on your machine.
  for(const f of ['bench.local.json','per_candidate.json']){
    try {
      const res = await fetch(f, {cache:'no-store'});
      if(res.ok){
        const data = await res.json();
        if(data && Array.isArray(data.candidates)){ BENCH=data; SOURCE='file'; render(); updateSrc(); return; }
      }
    } catch(e){ /* not present — fine */ }
  }
  // 2) Bench imported earlier via the button (kept in this browser only).
  const local = localStorage.getItem(LS_BENCH);
  if(local){
    try { BENCH = JSON.parse(local); SOURCE='local'; render(); updateSrc(); return; } catch(e){}
  }
  // 3) Anonymised sample shipped with the repo.
  try {
    const res = await fetch('bench.sample.json');
    BENCH = await res.json(); SOURCE='sample';
  } catch(e){
    BENCH = { candidates: [] };
    document.getElementById('app').innerHTML =
      `<div class="empty"><h2>Couldn't load any bench</h2><p>Run this over a local server (see README / the <code>start</code> script). Double-clicking the file makes the browser block local data loads.</p></div>`;
  }
  render(); updateSrc();
}

function updateSrc(){
  const b = document.getElementById('srcBadge');
  const t = document.getElementById('srcText');
  const n = (BENCH.candidates||[]).length;
  if(SOURCE==='file'){ b.classList.add('live'); t.textContent = `your bench · ${n} · local file`; }
  else if(SOURCE==='local'){ b.classList.add('live'); t.textContent = `your bench · ${n}`; }
  else { b.classList.remove('live'); t.textContent = `anonymised sample`; }
}

function importBench(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!data.candidates || !Array.isArray(data.candidates)) throw new Error('no candidates[]');
      BENCH = data; SOURCE='local';
      localStorage.setItem(LS_BENCH, JSON.stringify(data));
      view = {name:'board', id:null}; render(); updateSrc();
    } catch(e){ alert('That file did not look like a per_candidate.json bench export.\n\n('+e.message+')'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

/* ---------- helpers ---------- */
function cand(id){ return (BENCH.candidates||[]).find(c => cid(c)===id); }
function cid(c){ return c.candidateId || c.name; }
function matches(c){ return (c.matches||[]).filter(m=>m && (m.title||m.company)); }
function topMatch(c){ const m=matches(c); return m.length? Math.max(...m.map(x=>x.pct||0)) : 0; }
function statusOf(c){ return c.status || 'active'; }
function outsFor(id){ return SPECOUTS.filter(s=>s.candidateId===id); }
function daysAgo(iso){ const d=(new Date(todayISO)-new Date(iso))/86400000; if(d<1)return'today'; if(d<2)return'yesterday'; return Math.round(d)+'d ago'; }

const SO_LABEL = { sent:'Spec sent', opened:'Opened', interested:'Interested', call:'Call booked', offer:'Offer out', placed:'Placed', passed:'Passed' };
const SO_ORDER = ['sent','opened','interested','call','offer','placed','passed'];

/* heat = closeness to a spec-out opportunity */
function heatClass(c){ const t=topMatch(c); if(t>=80)return'm-hot'; if(t>0)return'm-warm'; return'm-none'; }

/* perfect-fit businesses are the primary target; live job matches are legacy fallback */
function targetBiz(c){ return (c.targetBusinesses||[]).filter(b=>b && b.company); }
function opps(c){
  const b = targetBiz(c);
  if(b.length){
    const heat = b.some(x=>x.fit==='strong') ? 'm-hot' : 'm-warm';
    return { n:b.length, label:'fit business', top:b[0].company, heat, badge: (b[0].fitScore? b[0].fitScore : 'fit') };
  }
  const m = matches(c);
  return { n:m.length, label:'live target', top:(m[0]&&(m[0].company||m[0].title))||'', heat:heatClass(c), badge: topMatch(c)? topMatch(c)+'%' : '—' };
}
const EMAIL_LABEL = { verified:'verified ✓', format_valid:'format ✓', unverified:'unverified', risky:'risky', invalid:'invalid ✗' };
function emailBadge(st){ const s = st||'unverified'; return `<span class="eb eb-${s}">${EMAIL_LABEL[s]||s}</span>`; }

/* ---------- Reoon email verification (key stored locally, verify via local proxy) ---------- */
let EMAILV = (function(){ try{ return JSON.parse(localStorage.getItem(LS_EMAIL))||{} }catch(e){ return {} } })();
function getKey(){ return localStorage.getItem(LS_KEY)||''; }
function setKey(k){ if(k) localStorage.setItem(LS_KEY,k); else localStorage.removeItem(LS_KEY); }
function statusFor(email, fallback){ return (email && EMAILV[email]) || fallback || 'unverified'; }

function openKeyModal(){
  modal(`<h3>Reoon email verification</h3>
    <p class="hint" style="margin:-4px 0 12px">Paste your Reoon API key. It's stored only in <b>this browser</b> and sent only to your local server to check emails — never uploaded, never committed.</p>
    <label class="f"><span>Reoon API key</span><input id="m_key" value="${attr(getKey())}" placeholder="paste your Reoon key here"></label>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Close</button>
      <button class="btn ghost" onclick="saveKeyOnly()">Save key</button>
      <button class="btn" onclick="saveKeyAndVerify()">Save &amp; verify all</button>
    </div>
    <p class="hint" style="margin-top:12px">Get a key at <b>emailverifier.reoon.com</b>. In-app verify needs the bundled Node server (<code>start.command</code> uses it automatically when Node is installed).</p>`);
}
function saveKeyOnly(){ setKey(document.getElementById('m_key').value.trim()); closeModal(); }
function saveKeyAndVerify(){ setKey(document.getElementById('m_key').value.trim()); closeModal(); verifyEmails(null); }

async function verifyEmails(ids){
  const key = getKey();
  if(!key){ openKeyModal(); return; }
  const emails = [];
  for(const c of (BENCH.candidates||[])){
    if(ids && !ids.includes(cid(c))) continue;
    for(const b of targetBiz(c)){ if(b.contact && b.contact.email) emails.push(b.contact.email); }
  }
  const uniq = [...new Set(emails)];
  if(!uniq.length){ alert('No business contact emails to verify yet.'); return; }
  let ok=0, fail=0;
  setSrcText(`verifying 0/${uniq.length}…`);
  for(let i=0;i<uniq.length;i++){
    const email = uniq[i];
    try{
      const r = await fetch(`/__verify?email=${encodeURIComponent(email)}&key=${encodeURIComponent(key)}`);
      if(!r.ok) throw new Error('proxy '+r.status);
      const j = await r.json();
      EMAILV[email] = j.emailStatus || 'risky'; ok++;
    }catch(e){ fail++; }
    setSrcText(`verifying ${i+1}/${uniq.length}…`);
  }
  localStorage.setItem(LS_EMAIL, JSON.stringify(EMAILV));
  updateSrc(); render();
  if(ok===0 && fail>0){ alert('Couldn\'t reach the local verifier.\n\nIn-app verify needs the Node server — relaunch with start.command (Node installed), or run:\n  REOON_API_KEY=yourkey node verify_emails.js bench.local.json'); }
  else if(fail){ alert(`Verified ${ok}, ${fail} couldn\'t be checked.`); }
}
function setSrcText(t){ const el=document.getElementById('srcText'); if(el) el.textContent=t; }

/* ---------- render ---------- */
function render(){
  renderNav();
  const app = document.getElementById('app');
  if(view.name==='board') app.innerHTML = boardView();
  else if(view.name==='candidate') app.innerHTML = candidateView(view.id);
}
function renderNav(){
  document.getElementById('nav').innerHTML =
    `<button class="${view.name!=='candidate'?'active':''}" onclick="go('board')">The Bench</button>`;
}

function metricsStrip(){
  const cs = BENCH.candidates||[];
  const onShelf = cs.filter(c=>stageOf(c)==='shelf').length;
  const inProgress = cs.filter(c=>{ const i=STAGE_IDX[stageOf(c)]; return i>=1 && i<=4; }).length;
  const complete = cs.filter(c=>stageOf(c)==='complete').length;
  const m = [
    [cs.length,'candidate-projects'],
    [onShelf,'on the shelf'],
    [inProgress,'in progress'],
    [complete,'placed · complete'],
    [SPECOUTS.length,'spec-outs logged'],
  ];
  return `<div class="metrics">${m.map(([n,l])=>`<div class="metric"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('')}</div>`;
}

function filteredCandidates(){
  let cs = [...(BENCH.candidates||[])];
  if(filter.sector!=='all') cs = cs.filter(c=>(c.primarySector||'')===filter.sector);
  if(filter.status!=='all') cs = cs.filter(c=>statusOf(c)===filter.status);
  if(filter.q){
    const q=filter.q.toLowerCase();
    cs = cs.filter(c=>JSON.stringify([c.name,c.primarySector,c.geography,c.seniority,c.targetRoles,c.anonRef]).toLowerCase().includes(q));
  }
  return cs;
}

function boardView(){
  const cs = filteredCandidates();
  const sectors = [...new Set((BENCH.candidates||[]).map(c=>c.primarySector).filter(Boolean))].sort();
  return `${metricsStrip()}
    <div class="creed">Every candidate is a project. The job is to get them off the shelf and into a business — placement is Complete.</div>
    ${SOURCE==='sample'? `<div class="priv">🔒 <span>You're viewing the <b>anonymised sample</b>. Click <b>Load my bench</b> (top right), or drop your <b>per_candidate.json</b> next to this file as <b>bench.local.json</b> and hit <b>↻ Refresh</b> — read on your machine only, never committed.</span></div>`:''}
    <div class="controls">
      <div class="vtoggle">
        <button class="${boardMode==='pipeline'?'on':''}" onclick="setMode('pipeline')">Pipeline</button>
        <button class="${boardMode==='list'?'on':''}" onclick="setMode('list')">List</button>
      </div>
      <input type="text" placeholder="Search…" value="${attr(filter.q)}" oninput="setFilter('q',this.value)">
      <select onchange="setFilter('sector',this.value)"><option value="all">All sectors</option>${sectors.map(s=>`<option ${filter.sector===s?'selected':''} value="${attr(s)}">${esc(s)}</option>`).join('')}</select>
      <select onchange="setFilter('status',this.value)"><option value="all">All</option><option ${filter.status==='active'?'selected':''} value="active">Active</option><option ${filter.status==='parked'?'selected':''} value="parked">Parked</option></select>
      <span style="color:var(--muted);font-size:12.5px">${cs.length} shown</span>
    </div>
    ${boardMode==='pipeline' ? pipelineView(cs) : listView(cs)}`;
}

function pipelineView(cs){
  const cols = STAGES.map(st=>{
    const inStage = cs.filter(c=>stageOf(c)===st.key);
    // within a column, hottest / most-recently-moved first
    inStage.sort((a,b)=> topMatch(b)-topMatch(a) || matches(b).length-matches(a).length);
    const cards = inStage.map(c=>{
      const id=cid(c), parked=statusOf(c)==='parked', o=opps(c);
      const p=PROG[id]||{};
      return `<div class="kcard ${parked?'parked':''} ${st.key==='complete'?'done':''}" draggable="true"
          ondragstart="onDrag(event,'${id}')" onclick="openCandidate('${id}')">
        <div class="kn">${esc(c.name)}</div>
        <div class="kr">${esc(c.seniority||'')} · ${esc(c.primarySector||'')} · ${esc(c.geography||'')}</div>
        ${st.key==='complete' && p.company ? `<div class="placedco">→ ${esc(p.company)}</div>`
          : `<div class="kf"><span class="matchbadge ${o.heat}" style="font-size:12px">${esc(String(o.badge))}</span><span>${o.n} ${o.label}${o.n!==1?'s':''}${parked?' · parked':''}</span></div>`}
      </div>`;
    }).join('');
    return `<div class="col" data-stage="${st.key}" ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,'${st.key}')">
      <div class="colhead"><span class="t">${st.label}</span><span class="cnt">${inStage.length}</span></div>
      <div class="stagebar" style="background:${st.color}"></div>
      ${cards||'<div class="colempty">—</div>'}
    </div>`;
  }).join('');
  return `<div class="section-head"><h2>Pipeline</h2><span class="sub">drag a candidate along as they move — drop in <b style="color:var(--good)">Complete</b> to place</span></div>
    <div class="pipeline">${cols}</div>`;
}

function listView(cs){
  const SEN = {'C-suite':6,'SVP':5,'VP':4,'Director':3,'Senior Manager':2,'Manager':1};
  cs = [...cs].sort((a,b)=> STAGE_IDX[stageOf(b)]-STAGE_IDX[stageOf(a)] || topMatch(b)-topMatch(a) || (SEN[b.seniority]||0)-(SEN[a.seniority]||0));
  const cards = cs.map(c=>{
    const id=cid(c), st=STAGE[stageOf(c)], o=opps(c);
    return `<div class="card" onclick="openCandidate('${id}')">
      <div class="top">
        <div><div class="name">${esc(c.name)}</div><div class="role">${esc(c.seniority||'')} · ${esc(c.primarySector||'')} · ${esc(c.geography||'')}</div></div>
        <span class="stage-pill" style="background:${st.color}">${st.label}</span>
      </div>
      <div class="ref">${esc(c.anonRef||'No anon profile yet.')}</div>
      <div class="foot">
        <span class="matchbadge ${o.heat}">${esc(String(o.badge))}</span>
        <span><b>${o.n}</b> ${o.label}${o.n!==1?'s':''}${o.n?` · top: ${esc(o.top)}`:''}</span>
      </div>
    </div>`;
  }).join('');
  return `<div class="section-head"><h2>The Bench</h2><span class="sub">every candidate-project, furthest-along first</span></div>
    <div class="board">${cards||'<div class="empty">No candidates match.</div>'}</div>`;
}

/* ---------- drag & drop ---------- */
let DRAG_ID = null;
function onDrag(e,id){ DRAG_ID=id; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',id); }
function onOver(e){ e.preventDefault(); e.currentTarget.classList.add('over'); }
function onLeave(e){ e.currentTarget.classList.remove('over'); }
function onDrop(e,stage){
  e.preventDefault(); e.currentTarget.classList.remove('over');
  const id = DRAG_ID || e.dataTransfer.getData('text/plain'); DRAG_ID=null;
  if(!id) return;
  if(stage==='complete'){ openComplete(id); return; }
  setStage(id, stage); render();
}

function candidateView(id){
  const c = cand(id); if(!c) return '<div class="empty">Not found</div>';
  const m = matches(c); const outs = [...outsFor(id)].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sentTo = new Set(outs.map(o=>o.target));

  const sheet = `<div class="panel specsheet">
    <div class="cand-header"><h1>${esc(c.name)}</h1><span class="pill ${statusOf(c)}">${statusOf(c)==='active'?'marketing':statusOf(c)}</span></div>
    <div class="cand-sub">${esc(c.seniority||'')} · ${esc(c.primarySector||'')} · ${esc(c.geography||'')}</div>
    <dl>
      <dt>Targets</dt><dd>${(c.targetRoles||[]).map(esc).join(', ')||'—'}</dd>
      <dt>Sectors</dt><dd>${(c.sectorTags||[]).map(esc).join(', ')||esc(c.primarySector||'—')}</dd>
      <dt>Scale</dt><dd>${esc(c.scaleHandled||'—')}</dd>
      <dt>Anchors</dt><dd><div class="tags">${(c.anchorSkills||[]).map(s=>`<span class="tag">${esc(s)}</span>`).join('')||'—'}</div></dd>
    </dl>
    <div class="ref-block"><b style="color:var(--accent)">Anon spec:</b> ${esc(c.anonRef||'—')}</div>
    ${(c.pitchHooks||[]).length?`<div style="margin-top:14px"><div class="hint" style="margin:0 0 6px">Pitch hooks</div><ul class="hooks">${c.pitchHooks.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>`:''}
  </div>`;

  const biz = targetBiz(c);
  const hasEmails = biz.some(b=>b.contact && b.contact.email);
  const engine = biz.length ? `<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <h3 style="margin:0">Perfect-fit businesses <span style="color:var(--muted);font-weight:400;font-size:13px">· ${biz.length}</span></h3>
      ${hasEmails?`<button class="btn sm ghost" onclick="verifyEmails(['${id}'])" title="Check these emails with Reoon">Verify emails</button>`:''}
    </div>
    <p class="hint" style="margin-top:6px">Businesses where this candidate is the obvious answer — fit alone, no vacancy needed. Send them in with the reasoning.</p>
    ${biz.map((b,i)=>{
      const c2 = b.contact||{};
      const specced = sentTo.has('biz:'+b.company);
      return `<div class="biz">
        <div class="bh">
          <div><div class="bn">${esc(b.company)}</div><div class="bm">${esc(b.location||'')} · ${esc(b.sector||'')}${b.revenueBand?' · '+esc(b.revenueBand):''}</div></div>
          <span class="fitb fit-${esc(b.fit||'good')}">${esc((b.fit||'good').toUpperCase())}${b.fitScore?' · '+b.fitScore:''}</span>
        </div>
        <ul class="why">${(b.reasoning||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
        <div class="contact">
          ${c2.email?`<span class="crole">${esc(c2.name||c2.role||'Contact')}</span><span class="em">${esc(c2.email)}</span>${emailBadge(statusFor(c2.email,c2.emailStatus))}`:'<span class="crole">No contact yet — run the email finder</span>'}
          ${specced?'<span class="eb eb-verified" style="margin-left:auto">specced ✓</span>':`<button class="btn sm" style="margin-left:auto" onclick="openSpecoutBiz('${id}',${i})">Spec out →</button>`}
        </div>
      </div>`;
    }).join('')}
  </div>` : `<div class="panel">
    <h3>Perfect-fit businesses</h3>
    <p class="hint">No fit businesses sourced yet for this candidate.${m.length?' (Legacy job matches shown below.)':''} Run the business finder to populate them.</p>
    ${m.length? m.map((t,i)=>`
      <div class="target">
        <div class="tinfo">
          <div class="tname">${esc(t.title||'Role')} <span style="color:var(--muted);font-weight:400">· ${esc(t.company||'')}</span></div>
          <div class="tmeta">${esc(t.location||'')} ${t.source?'· '+esc(t.source):''} ${t.postedAt?'· posted '+daysAgo(t.postedAt):''} ${t.geoStatus?`<span class="geo ${esc(t.geoStatus)}">${esc(t.geoStatus)}</span>`:''}</div>
        </div>
        <span class="matchbadge ${ (t.pct||0)>=80?'m-hot':'m-warm'}">${t.pct||'?'}%</span>
        ${sentTo.has(targetKey(t))?'<span class="geo in" style="white-space:nowrap">specced ✓</span>':`<button class="btn sm" onclick="openSpecout('${id}',${i})">Spec out →</button>`}
      </div>`).join('') : ''}
  </div>`;

  const timeline = `<div class="panel" style="margin-top:18px">
    <h3>Spec-out log</h3>
    <p class="hint">Every time this candidate has been put in front of an employer.</p>
    ${outs.length? outs.map(o=>`
      <div class="so">
        <div class="when">${daysAgo(o.date)}</div>
        <div class="body">
          <div class="emp">${esc(o.targetLabel||'')}</div>
          <div class="status stat-${o.status}">${SO_LABEL[o.status]||o.status}</div>
          ${o.note?`<div class="hint" style="margin:3px 0 0">${esc(o.note)}</div>`:''}
          <div style="margin-top:6px"><button class="btn sm ghost" onclick="openAdvance('${o.id}')">Log update</button></div>
        </div>
      </div>`).join('')
      : '<div class="hint">Not specced out yet. Use the engine →</div>'}
  </div>`;

  return `<button class="back" onclick="go('board')">← The Bench</button>

function progressPanel(c){
  const id = cid(c); const cur = stageOf(c); const curIdx = STAGE_IDX[cur]; const p = PROG[id]||{};
  const steps = STAGES.map((st,i)=>{
    const cls = i<curIdx ? 'fill done-stage' : i===curIdx ? (cur==='complete'?'fill current done-stage':'fill current') : '';
    return `<div class="step ${cls}" onclick="moveStage('${id}','${st.key}')" title="Move to ${st.label}"><span class="dotc"></span>${st.label}</div>`;
  }).join('');
  const placed = cur==='complete';
  const next = curIdx < STAGES.length-1 ? STAGES[curIdx+1] : null;
  return `<div class="panel progress-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="stage-pill" style="background:${STAGE[cur].color}">${STAGE[cur].label}</span>
        ${placed && p.company ? `<span style="color:var(--good);font-size:13px;font-weight:600">→ placed at ${esc(p.company)}${p.placedAt?` · ${daysAgo(p.placedAt)}`:''}</span>`
          : `<span style="color:var(--muted);font-size:12.5px">${esc(c.name)} as a project — moving off the shelf</span>`}
      </div>
      <div style="display:flex;gap:8px">
        ${!placed && next ? `<button class="btn sm ghost" onclick="moveStage('${id}','${next.key}')">Advance → ${next.label}</button>`:''}
        ${!placed ? `<button class="btn sm" onclick="openComplete('${id}')">Mark placed ✓</button>`
                  : `<button class="btn sm ghost" onclick="reopen('${id}')">Reopen</button>`}
      </div>
    </div>
    <div class="stepper">${steps}</div>
  </div>`;
}

function moveStage(id, stage){
  if(stage==='complete'){ openComplete(id); return; }
  setStage(id, stage); render();
}
function openComplete(id){
  const c = cand(id);
  // best guess at the business: an offer/interested spec-out, else top match
  const outs = outsFor(id);
  const hot = outs.find(o=>o.status==='offer') || outs.find(o=>o.status==='call') || outs.find(o=>o.status==='interested');
  const guess = (hot && (hot.targetLabel||'').split('·').pop().trim()) || (matches(c)[0] && matches(c)[0].company) || '';
  modal(`<h3>Place ${esc(c.name)} — off the shelf ✓</h3>
    <p class="hint" style="margin:-4px 0 12px">Marks this candidate-project <b style="color:var(--good)">Complete</b>. Which business are they going into?</p>
    <label class="f"><span>Business / employer</span><input id="m_co" value="${attr(guess)}" placeholder="e.g. Harvest Snack Co."></label>
    <label class="f"><span>Note (optional)</span><input id="m_pn" placeholder="e.g. VP Sales, start 1 Sept"></label>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="confirmComplete('${id}')">Mark placed</button></div>`);
}
function confirmComplete(id){
  const co = document.getElementById('m_co').value.trim();
  const note = document.getElementById('m_pn').value.trim();
  setStage(id, 'complete', { company:co, placedAt:todayISO, placeNote:note });
  closeModal(); render();
}
function reopen(id){ setStage(id, derivedStage(id), { company:'', placedAt:'' }); render(); }
function setMode(m){ boardMode=m; render(); }

/* ---------- spec-out ---------- */
function targetKey(t){ return (t.company||'')+'|'+(t.title||''); }

function openSpecout(id, idx){
  const c = cand(id); const t = matches(c)[idx];
  modal(`<h3>Spec out — ${esc(c.name)} → ${esc(t.company||'')}</h3>
    <p class="hint" style="margin:-4px 0 12px">This is the whole job: put the candidate in front of the employer. Edit the pitch, then log it.</p>
    <div class="pitchbox" id="pitchbox">${esc(pitch(c,t))}</div>
    <div class="anonnote">⚠ <span>Outbound copy uses the <b>anon spec</b> only — no name, no current employer. Identity stays in your decoder.</span></div>
    <label class="f" style="margin-top:12px"><span>Note (optional)</span><input id="m_note" placeholder="e.g. sent to hiring VP via LinkedIn"></label>
    <div class="modal-actions">
      <button class="btn ghost" onclick="copyPitch()">Copy</button>
      <button class="btn" onclick="logSpecout('${id}',${idx})">Log spec-out</button>
    </div>`);
}
function pitch(c, t){
  const role = (c.targetRoles||[])[0] || c.seniority || 'senior leader';
  const hooks = (c.pitchHooks||[]).slice(0,3).map(h=>'• '+h).join('\n');
  const company = t.company || 'your team';
  return `Subject: ${role} — available now, ${c.primarySector||''}

Hi — I look after a small bench of ${c.primarySector||''} leaders and one of them is a strong fit for ${company}${t.title?` (saw your ${t.title} role)`:''}.

${c.anonRef||''}

A few highlights:
${hooks}

Based in ${c.geography||'the US'}, open to ${role} mandates. Happy to share a full anonymised profile and set up a confidential call this week.

Best,
Scott
Williams Recruitment`;
}
function copyPitch(){ const el=document.getElementById('pitchbox'); navigator.clipboard && navigator.clipboard.writeText(el.innerText); }
function logSpecout(id, idx){
  const c = cand(id); const t = matches(c)[idx];
  SPECOUTS.push({ id:'s'+Math.random().toString(36).slice(2,8), candidateId:id, target:targetKey(t),
    targetLabel:`${t.title||''} · ${t.company||''}`, date:todayISO, status:'sent', note:document.getElementById('m_note').value.trim() });
  saveSpecouts(); syncStageFromOuts(id); closeModal(); render();
}

/* spec-out to a perfect-fit business */
function openSpecoutBiz(id, idx){
  const c = cand(id); const b = targetBiz(c)[idx]; const ct = b.contact||{};
  modal(`<h3>Spec out — ${esc(c.name)} → ${esc(b.company)}</h3>
    <p class="hint" style="margin:-4px 0 10px">Fit-led, not a CV drop. The pitch is built from the reasoning-why. ${ct.email?`Sending to <b>${esc(ct.email)}</b> ${emailBadge(statusFor(ct.email,ct.emailStatus))}`:'No verified contact yet — run the email finder.'}</p>
    <div class="pitchbox" id="pitchbox">${esc(pitchBiz(c,b))}</div>
    <div class="anonnote">⚠ <span>Outbound copy uses the <b>anon spec</b> only — no name, no current employer. Identity stays in your decoder.</span></div>
    <label class="f" style="margin-top:12px"><span>Note (optional)</span><input id="m_note" placeholder="e.g. sent to President via verified email"></label>
    <div class="modal-actions">
      <button class="btn ghost" onclick="copyPitch()">Copy</button>
      <button class="btn" onclick="logSpecoutBiz('${id}',${idx})">Log spec-out</button>
    </div>`);
}
function pitchBiz(c, b){
  const role = (c.targetRoles||[])[0] || c.seniority || 'senior leader';
  const ct = b.contact||{};
  const who = ct.name ? ct.name.split(' ')[0] : 'there';
  const why = (b.reasoning||[]).slice(0,3).map(r=>'• '+r).join('\n');
  return `Subject: A ${role} built for ${b.company}

Hi ${who},

I look after a small bench of ${c.primarySector||''} leaders, and one of them is a near-perfect fit for ${b.company} specifically — this isn't a generic CV drop:

${why}

${c.anonRef||''}

No need for a live vacancy — a leader like this creates their own return. Worth a short, confidential call this week? Happy to share the full anonymised profile.

Best,
Scott
Williams Recruitment`;
}
function logSpecoutBiz(id, idx){
  const c = cand(id); const b = targetBiz(c)[idx];
  SPECOUTS.push({ id:'s'+Math.random().toString(36).slice(2,8), candidateId:id, target:'biz:'+b.company,
    targetLabel:`${b.company}${b.contact&&b.contact.email?' · '+b.contact.email:''}`, date:todayISO, status:'sent', note:document.getElementById('m_note').value.trim() });
  saveSpecouts(); syncStageFromOuts(id); closeModal(); render();
}
function openAdvance(sid){
  const s = SPECOUTS.find(x=>x.id===sid);
  modal(`<h3>Update — ${esc(s.targetLabel||'')}</h3>
    <label class="f"><span>Where's it at?</span><select id="m_st">${SO_ORDER.map(o=>`<option value="${o}" ${s.status===o?'selected':''}>${SO_LABEL[o]}</option>`).join('')}</select></label>
    <label class="f"><span>Note</span><input id="m_n" value="${attr(s.note||'')}"></label>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveAdvance('${sid}')">Save</button></div>`);
}
function saveAdvance(sid){
  const s = SPECOUTS.find(x=>x.id===sid);
  s.status=document.getElementById('m_st').value; s.note=document.getElementById('m_n').value.trim();
  saveSpecouts();
  if(s.status==='placed'){ openComplete(s.candidateId); return; } // its own modal handles close + render
  syncStageFromOuts(s.candidateId);
  closeModal(); render();
}

/* ---------- nav / modal / util ---------- */
function go(n){ view={name:n,id:null}; render(); }
function openCandidate(id){ view={name:'candidate',id}; window.scrollTo(0,0); render(); }
function setFilter(k,v){ filter[k]=v; render(); if(k==='q'){ const el=document.querySelector('.controls input'); if(el){el.focus(); el.setSelectionRange(el.value.length,el.value.length);} } }
function modal(h){ document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function attr(s){ return (s==null?'':String(s)).replace(/"/g,'&quot;'); }

boot();
</script>
</body>
</html>
